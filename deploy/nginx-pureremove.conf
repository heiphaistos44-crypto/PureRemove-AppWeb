# /etc/nginx/sites-available/pureremove
# Vhost pureremove.heiphaistos.org → backend axum 127.0.0.1:3002
# Derrière Cloudflare proxy (orange cloud) — TLS terminé chez CF (mode Flexible)
# ou via certificat origin CF si mode Full.

server {
    listen 80;
    listen [::]:80;
    server_name pureremove.heiphaistos.org;

    # Taille max upload (le backend limite à 25 MB, marge ici)
    client_max_body_size 30m;

    # Pas de buffering : réponses PNG streamées directement
    proxy_buffering off;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # CF-Connecting-IP est transmis tel quel par Cloudflare (utilisé par le rate-limit)
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }
}
